<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Kitchen Crew — A Bedtime Story</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#1a0e08;
  color:#f4e8c8;
  font-family:'Cormorant Garamond',serif;
  min-height:100vh;
}
header{
  padding:24px 20px 16px;
  text-align:center;
  border-bottom:3px double #c9a84c;
  background:linear-gradient(180deg,#2a1a0a,#1a0e08);
}
header h1{font-family:'Cinzel',serif;font-size:28px;color:#c9a84c;letter-spacing:4px;text-transform:uppercase;text-shadow:0 0 30px rgba(201,168,76,0.3)}
header .byline{font-style:italic;color:#8a7a5a;font-size:16px;margin-top:6px}
header .dedication{color:#6a5a4a;font-size:14px;margin-top:8px;border-top:1px solid rgba(201,168,76,0.2);padding-top:8px;max-width:500px;margin-left:auto;margin-right:auto}
.book-nav{
  display:flex;justify-content:center;gap:8px;padding:12px 16px;
  background:rgba(0,0,0,0.3);
  border-bottom:1px solid rgba(201,168,76,0.15);
  overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.book-nav::-webkit-scrollbar{display:none}
.book-nav a{
  text-decoration:none;color:#8a7a5a;font-size:12px;font-family:'Cinzel',serif;
  padding:4px 10px;border-radius:12px;transition:all 0.2s;white-space:nowrap;
  letter-spacing:0.5px;
}
.book-nav a:hover,.book-nav a.active{color:#c9a84c;background:rgba(201,168,76,0.1)}
.story-container{
  max-width:680px;margin:0 auto;padding:32px 24px 60px;
}
.chapter{
  display:none;animation:fadeIn 0.5s;
}
.chapter.active{display:block}
.chapter-title{
  font-family:'Cinzel',serif;font-size:22px;color:#c9a84c;
  text-align:center;margin-bottom:24px;letter-spacing:2px;
  border-bottom:1px solid rgba(201,168,76,0.2);padding-bottom:12px;
}
.chapter-body{
  font-size:19px;line-height:1.8;
  color:#f4e8c8;
  white-space:pre-wrap;
}
.chapter-body p{margin-bottom:12px}
.chapter-nav{
  display:flex;justify-content:space-between;margin-top:32px;
  padding-top:16px;border-top:1px solid rgba(201,168,76,0.2);
}
.chapter-nav button{
  padding:8px 24px;background:transparent;border:1px solid #c9a84c;
  color:#c9a84c;font-family:'Cinzel',serif;font-size:13px;
  cursor:pointer;transition:all 0.3s;letter-spacing:1px;
}
.chapter-nav button:hover{background:#c9a84c;color:#1a0e08}
.chapter-nav button:disabled{opacity:0.3;cursor:default}
.chapter-nav button:disabled:hover{background:transparent;color:#c9a84c}
.progress{
  text-align:center;font-size:12px;color:#6a5a4a;margin-top:8px;
  font-family:'Cinzel',serif;letter-spacing:1px;
}
.audio-bar{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(26,14,8,0.95);backdrop-filter:blur(8px);
  border-top:1px solid rgba(201,168,76,0.2);
  padding:10px 16px;
  display:none;align-items:center;gap:12px;
  z-index:100;
}
.audio-bar.active{display:flex}
.audio-bar .play-btn{
  width:40px;height:40px;border-radius:50%;border:2px solid #c9a84c;
  background:transparent;color:#c9a84c;font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all 0.2s;
}
.audio-bar .play-btn:hover{background:#c9a84c;color:#1a0e08}
.audio-bar .info{font-size:13px;color:#8a7a5a;flex:1;overflow:hidden}
.audio-bar .info .name{color:#c9a84c;font-weight:600}
.audio-bar .info .status{font-size:11px;color:#6a5a4a;font-style:italic}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:600px){
  header h1{font-size:20px}
  .story-container{padding:20px 16px 80px}
  .chapter-body{font-size:17px}
}
</style>
</head>
<body>

<header>
  <h1>⟡ The Kitchen Crew</h1>
  <div class="byline">by Jon's Mum</div>
  <div class="dedication">For the little ones who believe their spoons have opinions</div>
</header>

<div class="book-nav" id="chapterNav"></div>

<div class="story-container" id="storyContainer"></div>

<div class="audio-bar" id="audioBar">
  <button class="play-btn" id="playBtn">▶</button>
  <div class="info">
    <div><span class="name" id="audioName">Mum's Voice</span></div>
    <div class="status" id="audioStatus">Ready to read</div>
  </div>
</div>

<script>
const CHAPTERS = [];

fetch('kk-chapters.json').then(r=>r.json()).then(data=>{
  CHAPTERS.push(...data);
  render();
  showChapter(0);
}).catch(()=>{
  // Fallback if JSON fails
});

let currentChapter = 0;
let audioFiles = [];

function render(){
  const nav = document.getElementById('chapterNav');
  nav.innerHTML = CHAPTERS.map((c,i) =>
    `<a href="#" data-ch="${i}" class="${i===0?'active':''}">Ch.${c.num}</a>`
  ).join('');
  nav.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', e => {
      e.preventDefault();
      showChapter(parseInt(a.dataset.ch));
    });
  });

  const container = document.getElementById('storyContainer');
  container.innerHTML = CHAPTERS.map((c,i) => `
    <div class="chapter ${i===0?'active':''}" data-ch="${i}">
      <div class="chapter-title">Chapter ${c.num} — ${c.title}</div>
      <div class="chapter-body">${c.body.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>')}</div>
      <div class="chapter-nav">
        <button class="prev-btn" data-ch="${i}" ${i===0?'disabled':''}>← Previous</button>
        <span class="progress">${i+1} of ${CHAPTERS.length}</span>
        <button class="next-btn" data-ch="${i}" ${i===CHAPTERS.length-1?'disabled':''}>Next →</button>
      </div>
    </div>
  `).join('');

  document.querySelectorAll('.prev-btn').forEach(b => {
    b.addEventListener('click', () => showChapter(parseInt(b.dataset.ch) - 1));
  });
  document.querySelectorAll('.next-btn').forEach(b => {
    b.addEventListener('click', () => showChapter(parseInt(b.dataset.ch) + 1));
  });
}

function showChapter(idx){
  if(idx < 0 || idx >= CHAPTERS.length) return;
  currentChapter = idx;
  document.querySelectorAll('.chapter').forEach(c => c.classList.remove('active'));
  document.querySelector(`.chapter[data-ch="${idx}"]`).classList.add('active');
  document.querySelectorAll('.book-nav a').forEach(a => a.classList.remove('active'));
  document.querySelector(`.book-nav a[data-ch="${idx}"]`).classList.add('active');
  document.getElementById('storyContainer').scrollTop = 0;
  window.scrollTo(0, 0);
  playChapterAudio(idx);
}

function loadAudioFiles(){
  // Look for Mum's Voice clips from localStorage (set by recording studio)
  // Or use pre-loaded clips from the server
  const recordings = JSON.parse(localStorage.getItem('tpw-recordings') || '{}');
  audioFiles = Object.values(recordings).filter(v => typeof v === 'string' && v.startsWith('data:'));
  if(audioFiles.length > 0){
    document.getElementById('audioBar').classList.add('active');
  }
}

function playChapterAudio(idx){
  const bar = document.getElementById('audioBar');
  const status = document.getElementById('audioStatus');
  const name = document.getElementById('audioName');

  if(audioFiles.length === 0){
    bar.classList.remove('active');
    return;
  }
  bar.classList.add('active');
  // Pick a random voice clip for this chapter
  const clip = audioFiles[idx % audioFiles.length];
  if(clip){
    name.textContent = `Mum's Voice — Chapter ${idx+1}`;
    status.textContent = 'Tap play to hear';
    const btn = document.getElementById('playBtn');
    let playing = false;
    let audio = null;
    btn.onclick = () => {
      if(playing && audio){
        audio.pause();
        playing = false;
        btn.textContent = '▶';
        status.textContent = 'Paused';
        return;
      }
      audio = new Audio(clip);
      audio.onended = () => { playing = false; btn.textContent = '▶'; status.textContent = 'Finished'; };
      audio.play().then(() => {
        playing = true;
        btn.textContent = '⏸';
        status.textContent = 'Reading...';
      }).catch(() => {
        status.textContent = 'Voice clip unavailable';
      });
    };
  }
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if(e.key === 'ArrowRight') showChapter(currentChapter + 1);
  if(e.key === 'ArrowLeft') showChapter(currentChapter - 1);
});

// Try loading audio
loadAudioFiles();
</script>
</body>
</html>
